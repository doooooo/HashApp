<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            font-family: Arial;
            text-align:center;
            margin-top:100px;
        }

        .container{
            width:300px;
            margin:auto;
            border:1px solid #ddd;
            padding:20px;
            border-radius:10px;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
        }

        .error{
            color:red;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Login</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>
    <p>New user: <a href="/signup">register</a></p>
    {% if error %}
        <p class="error">
            {{ error }}
        </p>
    {% endif %}

</div>

</body>
</html>
