<!DOCTYPE html>
<html>
<head>
    <title>SHA256 Hash Generator</title>

    <style>

        body{
            font-family: Arial;
            margin-top: 60px;
        }

        .container{
            width: 900px;
            margin: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 30px;
        }

        .row{
            display: flex;
            justify-content: space-between;
            gap: 40px;
        }

        .column{
            width: 45%;
        }

        h2{
            text-align:center;
        }

        input[type=text]{
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        button{
            padding: 10px 20px;
            margin-bottom: 10px;
        }

        .readonly{
            background-color: #f5f5f5;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>SHA256 Hash Generator</h2>

    <div class="row">

        <!-- LEFT SIDE -->
        <div class="column">

            <h3>Field 1</h3>

            <input
                id="plain1"
                type="text"
                placeholder="Enter text"
            >

            <button onclick="hashField('plain1','hash1')">
                Hash
            </button>

            <input
                id="hash1"
                class="readonly"
                type="text"
                readonly
                placeholder="Hashed value"
            >

        </div>

        <!-- RIGHT SIDE -->
        <div class="column">

            <h3>Field 2</h3>

            <input
                id="plain2"
                type="text"
                placeholder="Enter text"
            >

            <button onclick="hashField('plain2','hash2')">
                Hash
            </button>

            <input
                id="hash2"
                class="readonly"
                type="text"
                readonly
                placeholder="Hashed value"
            >

        </div>

    </div>

</div>

<script>

async function hashField(sourceId, targetId) {

    const text =
        document.getElementById(sourceId).value;

    const response =
        await fetch('/hash', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                text: text
            })
        });

    const data = await response.json();

    document.getElementById(targetId).value =
        data.hash;
}

</script>

</body>
</html>
